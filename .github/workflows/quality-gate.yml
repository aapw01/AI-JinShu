name: quality-gate

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest -q
      - name: Offline generation metrics
        run: uv run python scripts/evaluate_generation_metrics.py --enforce-thresholds
