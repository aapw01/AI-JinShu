services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: novel_secret
      POSTGRES_DB: novel_db
    ports:
      - "127.0.0.1:25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel -d novel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: {}
